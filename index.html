<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <script src="main.js" type="module"></script>

    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #ffffff;
        overflow: hidden;
      }

      canvas {
        display: block;
      }

      .controls {
        position: fixed;
        top: 16px;
        left: 16px;
        z-index: 10;
        padding: 10px 12px;
        border: 1px solid #aaaaaa;
        border-radius: 10px;
        background: #ffffff;
        color: #000000;
        font: 12px/1.3 sans-serif;
      }

      .controls label {
        display: block;
        margin-bottom: 6px;
      }

      .controls input {
        width: 180px;
        margin-bottom: 8px;
      }

      .controls input:last-child {
        margin-bottom: 0;
      }
    </style>

    <link rel="shortcut icon" href="data:image/x-icon;," type="image/x-icon" />
  </head>
  <body>
    <div class="controls">
      <label for="speed">
        Smoke Speed: <span id="speed-value">0.00450</span>
      </label>
      <input
        id="speed"
        type="range"
        min="0.00100"
        max="0.01000"
        step="0.00010"
        value="0.00450"
      />

      <label for="noise-randomizer">
        Noise Field Randomizer: <span id="noise-randomizer-value">1.00</span>
      </label>
      <input
        id="noise-randomizer"
        type="range"
        min="0.00"
        max="3.00"
        step="0.01"
        value="1.00"
      />
    </div>
    <canvas></canvas>
  </body>
</html>
